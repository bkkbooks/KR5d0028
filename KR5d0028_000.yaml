front:
  text: 易外別傳并敘若七易外別傳者先天圖環中之祕漢儒魏伯陽參同契之學也人生天地間首乾腹坤呼日吸月與天地同一陰陽易以道陰陽故伯陽借易以明其説大要不出先天一圖是雖易道之緒餘然變君子養生之切務蓋不可不知也圖之妙在乎終坤始復循環無窮其至妙則又在乎坤復之交一勳一靜之間愚嘗學此矣遍閲雲笈略曉其一二忽遇隱者授以讀易之法乃盡得環中之祕反而求之吾身則康節邵子所謂太極所謂天根月窟所謂三十六宮靡不備馬是謂身中之易今為圖如左附以先儒之説明白無隱一覽即見識者當自知之至元甲申八月望日古吳石澗道人俞琰書易外别傳
