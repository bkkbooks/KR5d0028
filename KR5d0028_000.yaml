body:
  text: 古吳石澗道人俞琰述邵康節曰心為太極太極朱紫陽曰太極虛中之象也先天圖參同契云終坤始復如循連環邵康節詩云自從會得環中意間氣胸中一點無又云乾遇巽時觀月窟地逢雷處看天根天根月窟間來往三十六宫都是春月天窟根愚謂月窟在上天根在下往來乎月窟天根之間者心也何謂三十六宫乾一兌二離三震四巽五坎六艮七坤八是也三十六宫都是春謂和氣周流乎一身也如此則三十六宫不在紙上而在吾身中矣是道也邵康節知之朱紫陽知之俗儒不知也邵康節皇極經世書云先天圖者環中也愚謂人之一身即先天圖也心居人身之中猶太極在先天圖之中朱紫陽謂中間空處是也圖自復而始至坤而終終始相連如環故謂之環環中者六十四卦環於其外而太極居其中也在易為太極在人為心人知心為太極則可以語道矣又云冬至之後為呼夏至之後為吸此天地一歲之呼吸也朱紫陽曰天地間只是一氣自今年冬至到明年冬至只是一箇呼吸呼是陽吸是陰愚謂冬至後自復而乾屬陽故以為呼夏至後自姤而坤屬陰故以為吸呼乃氣之出故屬冬至之後吸乃氣之入故屬夏至之後大則為天地一歲之呼吸小則為人身一息之呼吸參同契云龍呼於虎虎吸龍精又云呼吸相含育佇息為夫婦蓋以呼吸為龍虎為夫婦千經萬論譬喻紛紛不過呼吸雨字而已矣又云一動一靜天地之至妙者歟一動一靜之間天地人之至妙者歟朱紫陽曰圖之左屬陽右屬陰愚謂圖左自復至乾陽之動也圖右自姤至坤陰之靜也一動一靜之間乃坤末復初陰陽之交在一歲為冬至在一月為晦朔之間在一日則亥末子初是也孟康曰子之西亥之東其中間也愚謂吾身之乾坤內交靜極機發而與天地之機相應是誠天地人之至妙者也又云寂然不動以其無陽坤之象也感而遂通天下之故陽動于中復之義也愚謂寂者靜之極也是為純陰之坤感者動之初也是為陽生之復寂感之間即一動一靜之間也又云無極之前陰合陽也有象之後陽分陰也朱紫陽曰邵子就圖上説循環之意自姤至坤是陰含陽自復至乾是陽分陰坤復之間乃無極袁機仲曰朱子謂坤復之間乃無極其論察矣又詩云忽然夜半一聲雷萬户千門次第開若識無中含有象許君親見伏義來無中含有象即是坤復之間無極而太極也邵子之學非朱子孰能明之又冬至吟云冬至子之半天心無改移一陽初動處萬物未生時玄酒味方淡大音聲正希此言如不信更請問庖犧又云何者謂之機天根理極微今年初盡處明日起頭時此際易得意其間難下辭人能知此意何事不能知又和魏教授詩云讀書每到天根處長懼諸公問極玄朱紫陽曰子之半是未成子方離於亥之時又曰一陽初動處在貞元之間愚謂此處正是造化之真機程伊川曰若非竊造化之機安能長生至哉言乎又恍惚吟云恍惚陰陽初變化氤氲天地乍回旋中間些子好光景安得功夫入語言有愚謂康節此詩泄盡天根之極玄苟非親造恍惚之境實詣氤氲之域安知其為極玄哉先天六十四卦直圖乾上坤下天地之定位也坎離得乾坤之中故居中邵康節皇極經世書云天地之本其起於中乎是以乾坤屢變而不離乎中也又云自下而上謂之升自上而下謂之降升者生也降者消也故陽生於下陰生於上是以萬物皆反生也又云陰生陽陽生陰陰復生陽陽復生陰是以循環而無窮也又乾坤吟云道不遠于人乾坤只在身誰往天地外别去覔乾坤愚謂乾坤陰陽之純坎離陰陽之交乾純陽為天故居中之上坤純陰為地故居中之下坎陰中含陽為月離陽中含陰為日故居乾坤之中其餘六十卦自坤中一陽之生而至五陽則升之極矣遂為六陽之純乾自乾中一陰之生而至五陰則降之極矣遂為六陰之純坤一升一降上下往來蓋循環而無窮也天地如此人身亦如此子時氣到尾閭丑寅在腰間卯辰巳在脊膂午在泥丸未申酉在胸膈戌亥則又歸於腹中此一日之升降然也一息亦然吸則自下而升于上呼則自上而降于下在天則應星而如斗指子午在地則應潮而如月在子午子午蓋天地之中也參同契云合符行中又云運移不失中又云浮遊守規中人能知吾身之中以合乎天地之中則乾坤不在天地而在吾身矣吾安得夫圓機之士而與之言身中之乾坤而極論身中之中哉吁地承天氣圖易曰平哉坤元萬物資生乃順承天參同契云恆順地理承天布宣愚謂人之元氣藏於腹猶萬物藏於坤神入地中猶天氣降而至于地氣與神合猶地道之承天天地以此而生物吾身以此而産藥太玄經云藏心于淵美厥靈根與此同旨月受日光圖邵康節曰月體本黑受日之光而白愚謂日為太陽月為太陰月本無光月之光乃日之光也陽明陰時陽稟陰受故太陰受太陽之光以為明人之心為太陽氣海猶太陰心定則神凝神凝則氣聚人能凝神入於氣中則氣與神合與太陰受太陽之光無異先天卦乾上坤下圖後天卦離南坎北圖邵康節曰神統於心氣統於腎形統於首形氣交而神主乎其中三才之道也愚謂人之一身首乾腹坤而心居其中其位猶三才也氣統於腎形統於首一上一下本不相交所以使之交者神也神連乎中則上下混融與天地同流此非三才之道歟夫神守於腎則靜而藏伏坤之道也守於首則動而運行乾之道也藏伏則妙合而凝運行則周流不息妙合而凝者藥也周天不息者火也陰符經云機在目邵康節曰天之神發乎日人之神發乎目愚謂目之所至心亦至焉故內鍊之法以目視鼻以鼻對臍降心火入于氣海蓋不過片餉功夫而已乾坤坎離圖天地日月圖易曰乾為天坤為地離為日坎為月又曰乾為首坤為腹太玄經云陽氣潛萌于黃宫黃庭經云子欲不死修崑崙又云出日入月呼吸存愚謂首居上而圓諸陽之所會乾天之象也故易以乾為首崑崙在西北乾位故黃庭經以乾為崑崙腹居下而中虛八脈之所歸坤地之象也故易以坤為腹天玄而地黃故太玄以坤為黃宫日生于東月生于西故易以離為日坎為月呼吸出入升降上下往來無窮故黃庭以呼吸為日月或以兩目為日月非也兩目僅有日月之形無日月之用八七九六圖木火金水圖參同契云九還七返八歸六居又云七八數十五九六亦相應又云金水合處木火為侣四者渾沌列為龍虎愚謂六七八九乃水火木金之成數木數八屬東火數七屬南木自東而升則與火為侣於南矣金數九屬西水數六屬北金自西而降則與水合處於北矣丹家有所謂赤龍黑虎者東方蒼龍七宿運而之南則為赤龍西方白虎七宿運而之北則為黑虎無非譬喻身中之呼吸究而言之何龍虎之有何金水木火之有何七八九六之有皆譬喻耳或疑九七八言還返歸六獨言居得無異乎曰六居北不動三方之還返歸皆聚于北故言居也乾坤交變十二卦循環升降圖乾上坤下吾身之天地也泰左否右吾身天地之升降也復非十一月亦非夜半子時乃身中之子也姤非五月亦非日中午時乃身中之午也張悟真云否泰交則陰陽或升或降蓋謂身中之泰否坎離交變十二卦循環升降圖坎北離南吾身之水火也既濟東未濟西吾身水火之升降也屯居寅蒙居戌吾身之火候也寅非平旦寅乃身中之寅戌非黃昏戌乃身中之戌張悟真曰屯蒙作動靜在朝在昏蓋謂身中之屯蒙屯蒙二卦反對一升一降圖既濟未濟反對一升一降圖參同契云朔旦屯直事至暮蒙當受晝夜各一卦用之依次序既未至昧爽終則復更始日辰為期度動靜有早晚春夏據內體從子到辰巳秋冬當外用自午訖戌亥愚謂參同契以乾坤為鼎坎離為藥因以其餘六十卦為火候一日有十二時兩卦計十二爻故日用兩卦朝屯則暮蒙朝需則暮訟以至既濟未濟一也屯倒轉則為蒙有一升一降之象屯自內而升為朝為晝為春夏蒙自外而降為暮為夜為秋冬諸卦皆然夫以六十卦分布為三十日以象一月然遇小盡則當如之何蓋比喻耳非真謂三十日也或以此為閉目數息之法則不勝其煩且勞矣豈至簡至易哉周易參同契金丹鼎器藥物火候萬殊一本之圖惟斯之妙術兮審諦不誑語傳於億世後兮昭然而可考煥若星經漢兮昺如水宗海思之務令熟兮反覆視上下千周粲彬彬兮萬遍將可覩神明或告人兮心靈忽自悟探瑞索其緒兮必得其門户天道無適莫兮常傳與賢者右係校正彭真一明鏡圖略加增損而成九環易曰天行健君子以自強不息胡安定曰天之形望之其色蒼然南樞入地下三十六度北樞出地上三十六度狀如倚杵此天之形也言其用則一晝夜之間几行九十餘萬里夫人之一呼一吸謂之一息一息之間天已行八十餘里人之一晝一夜而天行九十餘萬里則天之健用可知矣又曰人之神氣萃之則生散之則亡天有剛陽之氣運行不息故天體常存也愚按參同契云關楗有低昂兮周天遂奔走關楗謂南北二極周天謂二十人宿奔走謂運行也天形如彈丸周匝運轉晝夜不停其南北兩端一高一下乃關楗也人身亦然上有天關下有地軸若能回天關轉地軸則上下往來一息一周天也愚又按參同契云循據璇璣升降上下璇璣斗也天以斗為機人以心為機心運於身中猶斗運於天中愚又按陰符經云觀天之道執天之行盡矣蓋人道與天道一也人能收視返聽藏心於淵馭呼吸之往來周流不息則與天道同運而天行之機吾得而執之矣雖然天之道可以觀天之行未易執也敦能執之唯虛心者能執之易曰君子黃中通理正位居體美在其中而暢於四支發於事業美之至也徐進齋曰丹家亦取此義魏伯陽參同契謂黃中漸通理潤澤達肌膚但作用不同此為義理存養皆天公諸天也彼為血氣保固由人私諸已也愚謂參同契之説不過借易道以推明己意其間引用易中之辭未必皆取本文之義蓋易與天地相似人身亦與天地相似是故魏伯陽假易以作參同契黃中指身中之黃道易曰不遠復無只悔元吉朱紫陽曰老子云治人事天莫若嗇夫惟嗇是謂早服早服謂之重積德被他説得曲盡早服者言能圖則不遠而復便在此也重積德者言先已有所積復養以嗇是又加積之也如修養者此身未有所損失而又加以嗇養是謂早服而重積若待其已損而後養則養之方足以補其所損不得謂之重積矣所以貴早服早服者早覺未損而嗇之也如某此身已衰耗如破屋相似東扶西倒雖欲修養亦何能有益耶今年得蔡季通書説近來深墝養生之理盡得其法只是城郭不完無所施其功也看來是如此愚按曾至遊集仙傳云周從泗州人也徐神翁深重之曰我少而婚是人幼得道其神全吾不及也如周從者其亦老子所謂早服而重積者歟愚又按素問云丈夫八歲腎氣實髮長齒更二八腎氣盛天癸至精氣溢瀉陰陽和故能有子三八腎氣平均筋骨致強故真牙生而長極四八筋骨隆盛肌骨滿壯五八腎氣衰髮墮齒稿六八陽氣衰竭於上面焦髮鬢頒白七八肝氣衰筋不能動天癸竭精少腎藏衰形體皆極八八則齒髮去又云上古之人其知道者法於陰陽和於術數食飲有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心溺於生樂起居無節故半百而衰也愚謂人至於老則多忘神昏故也動則疲倦氣衰故也內鍊之道以神氣為本神昏氣衰則以何者為本易曰水洊至習坎愚按靈樞經云日行二十八宿人經脈上下左右前後二十八脈周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺日行二分二百七十息氣行十六丈二尺氣行交通于中一周于身下水二刻日行二十五分五百四十息氣行再周于身下水四刻日行四十分二千七百息氣行十周于身下水二十刻日行五宿二十分一萬三千五百息氣行五十營于身水下百刻日行二十八宿漏水皆盡脈終矣几行八百一十丈也又云氣之行如水之流如日月之行不休故陰脈營其藏陽脈營其府如環之無端莫知其紀終而復始愚謂人身氣血常常流通則安一有壅滯則病內鍊之道息息相繼如水之洊至而其流相續則真氣上下灌注亦如水之流通也易曰坎為水為月離為火為日項平庵曰心以坎為體離為用故心欲虛而澄腎以離為體坎為用故丹田欲實而溫損益皆三陽三陰之離損之火上飛益之火下伏又曰離體之火上騰故損離體之火下駐故益愚謂內鍊之道至簡至易唯欲降心火入于丹田耳丹田在臍之後腎之前正居腹中丹家諱言心腎謂心腎非坎離蓋指呼吸為坎離殊不思呼吸乃坎離之用心腎乃坎離之體人之一身心為之主故獨居中腎為之基故獨居下丹家不言心腎而言身心身即腹也腎在其中矣豈可捨腎哉腎屬水心屬火火入水中則水火交媾如晦朔之間日月之合璧易曰山澤通氣又曰二氣感應以相與愚按參同契云自然之所為兮非有邪偽道若山澤氣相蒸兮興雲而為雨蓋人身之陰陽絪緼交結于丹田則升于泥丸滃然如雲化為甘澤陳希夷詩云倏爾火輪煎地脈愕然神瀵湧山椒與此同旨神瀵出列子嘗謂山澤之氣相通由其虛也唯虛也故二氣感應以相與不虛則窒而不通安能相與內鍊之道貴乎心虛心虛則神凝神凝則氣聚氣聚則與雲為雨與山澤相似離騷遠遊篇云道可受兮不可傳其小無外兮其大無垠毋滑而魂兮彼將自然一氣孔神兮於中夜存虛以待之兮無為之先朱紫陽注云蓋廣成子之告黃帝不過如此實神仙之要訣也易曰一闔一闢謂之變往來不窮謂之通程伊川曰涵養之道出入之息者闔闢之機而已又曰闔闢往來見之鼻息張橫渠曰人之有息蓋剛柔相摩乾坤闔闢之象也朱紫陽調息針云氤氲開闔其妙無窮誰其尸之不宰之功愚按參同契云二用無爻位周流行六虛往來既不定上下亦無常幽潛淪匿變化於中二用九六也六虛卦之六畫也以喻一呼一吸往來上下久之則神凝息定所以成變化也呼則氣出陽之闢也吸則氣入陰之闔也蓋人身之陰陽與天地之陰陽相似若能御呼吸於上下使之周流不息則闔闢往來之妙盡在吾身中矣或曰大有大闔闢小有小闔闢一息之闔闢即一刻之闔闢一刻之闔闢即一時之闔闢一時之闔闢即一日之闔闢一日之闔闢即一月之闔闢一月之闔闢即一年之闔闢以至一世之闔闢一元之闔闢萬古之闔闢其理一也易曰日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉程伊川曰易中只是言反復往來上下愚謂丹家之書廣譬曲喻亦只是言反復往來上下外此皆邪説妄行非真要自然之道也愚按文子云流水之不腐以其逝故也户樞之不蠧以其連故也文子計然也周時人老子之弟子也人身氣血亦欲其往來流通一不流通小則為癤大則為癰疽癤者節也癰者壅也疽者阻也愚又按子華子云古之知道者築壘以防邪疏源以育真深居靜處不為物攖動息出入而與神氣俱魂魄守戒謹窒其兊專一不分真氣乃存上下灌注氣乃流通如水之流如日月之行而不休陰營其藏陽固其府源流泏泏滿而不溢沖而不盈夫是之謂久生子華子程本也孔子與之傾蓋而語者也人身氣血往來循環于上下晝夜不停猶江河之水相似人但見江河之水東流至于海而不竭殊不知名山大川孔穴皆相通也豈不見廬山瀑布乎晝夜傾注不絶何也水由地中行蓋往來相循環也日月之行亦然隨天之旋一出一入往來不窮人知吾身自有日月則往來不窮之妙只在吾身而不必索之高遠矣醫書云人身有任督二脈任脈者起於中極之下以上毛際循腹裏上關元至咽喉屬陰脈之海督脈者起於下極之腧並於脊裏上至風府入腦上顛循額至鼻柱屬陽脈之海所以謂之任脈者女子得之以妊養也謂之督脈者以其督領經脈之海也鹿連尾閭蓋能通其督脈者也龜納鼻息蓋能通其任脈者也人能通此二脈則百脈皆通黃庭經云皆在心內運天經晝夜存之自長生天經乃吾身之黃道呼吸往來於此印任督二脈是也易外别傅終
