  - {type: variant, offset: 5566, length: 2, content: 傅終, WYG: 𫝊一卷為之圖為之説披闡先天圖環中之極𤣥證以參同契隂符諸書參以伊川横渠諸儒之至論所以發朱子之所未發以推廣邵子言外之意愚雖弗暇専志從事於斯而丹之妙用非苟知之盖嘗試之者也故敢直指方士之所靳以破學者之惑嘗慨夫世所𫝊丹家之書廋辭𨼆語使覽者無罅縫可入往往目眩心碎而掩卷長嘆如蔡季通𡊮機仲嘗與朱子共訂正參同契矣雖能考其字義然不得其的𫝊未免臆度而已愚今既得所𫝊又何忍緘嘿以自私迺述是書附于周易集説之後而名之曰易外别傳盖謂丹家之説雖出于易不過依倣而託之者初非易之本義也其詳載于參同契發揮三篇兹不贅云石澗俞琰書元儒胡雙湖氏嘗為周易翼𫝊三篇又集太𤣥參同洞極之𩔖以為外篇而石澗俞氏亦為大易㑹要周易集説又舉先天圖環中之祕魏伯陽參同契之學以為易外别𫝊其取諸易者皆可謂博矣翼𫝊之書坊梓行㑹要集説舊嘗刻姑蘇今亦不見而此易外别傳則友人徐醫院鏊所恵盖亦姑蘇所刻本也其發明邵子之説為多于易盖有助焉朱子所謂易中無所不有茍其言自成一家可推而通則亦無害於易者是也而世顧或求之丹砂爐火之間誤矣石澗所著别有參同契發揮以其無繫扵易也故不復叙論正徳辛巳莆陽黄鞏書于蒙山草堂易外别傳}
