  - {type: indent, offset: 0, content: 　　　　, id: KR5d0028_krp_000-bkkind1}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 氏所撰紀我明黄後峯先生刻之棘寺者也比余長至齋居爰檢而閲焉書中𩔖多莊語如云坤復之交静極機發云藏心於淵氣與神合云妙合而凝周流不息云持滿御神真氣相續凡此皆發先天環中之祕而𤣥門所喻藥物火候悉寓焉雖近就人身提掇然造化之樞紐自可近取而博喻矣嘗怪養生家貪生濟欲毎迷于旁蹊曲徑而不悟是書一掃詖邪歸之正訣名為易外别傳實易之羽翼也黄先生刻而存之厥有指哉余曩遊萬里頗下静功累年已遇至人口訂始悟陽生妙機真宰由已發育有時顧自恨意氣難克非忘則助猶未能廓然順應以臻厥妙耳適得此書印證之殊快所願因叙而校刷數本將貽同好珍攝云世之流𫝊覽觀者慎無泥其卦圖與所謂子午之中而一惟澄神養氣以自得詎亦非吾}
