  - {type: variant, offset: 10, length: 1, content: 別, WYG: 别傳一卷元俞琰撰其書以邵子先天圖闡明丹家之㫖考先天圖傳自陳摶南宋以來無不推為伏羲之秘文卦爻之本義𡊮樞林栗雖據理以攻之然不能抉其假借之根口衆我寡無以相勝也迨元延祐間天台陳應潤始指為叅同契爐火之説其言有根據然宗河洛者深諱之巧辨萬端轇轕彌甚惟琰作此書絶無文飾其後序有曰名之曰易外别傳葢謂丹家之説雖出于易不過依仿而託之者非易之本義也可謂是非皎然不肯自誣其心者矣後序稱是書附周易集説後其子仲温跋亦云易外别傳一卷先君子之所著而附於周易集説後者今通志堂所刋集説成徳序中雖稱易圖纂要一卷易外别傳一卷附焉而印本實無此卷豈初鋟于木後覺其不𩔖而刪之耶白雲霽道藏目錄以此書與易圖通變易筮通變同載於太元部若字號中並題曰雷思齊撰考揭徯斯為思齊作序稱所著有老子本義莊子㫖義和陶詩呉全節序又稱其别有文集而均不及此書殆雲霽以三書同函而誤歟乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀易外别傳序易外别傳一卷元俞琰撰前後自有序蘇州府志琰字玉吾呉縣林屋山人生宋寳祐間以詞賦稱宋亡𨼆居著書不復仕進精於易學尤好鼓琴既老自號石澗卒於元貞間年七十所述諸家易說百餘卷名曰大易㑹要自注上下經並十翼四十卷名曰周易集説今惟集說獨存成氏通志堂刻之經解中而以易圖纂要一卷易外别傳一卷附焉其子仲温跋云易外别傳一卷先君子之所著而附於周易集説之後先君子嘗遇𨼆者以先天圖指示邵氏環中之極𤣥故是書所著發明邵氏之學為多仲温跋今本已無存見經義考云乾隆丙戌六月既望松里小𨼆吳城識于瓶花齋時年六十有五易外别}
