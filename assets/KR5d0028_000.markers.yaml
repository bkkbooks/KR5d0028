  - {type: variant, offset: 17, length: 13, content: 太極朱紫陽曰太極虚中之象也, WYG: 圖先天天根月窟圖先天六十四卦直圖地承天氣圖月受日光圖先天乾上坤下後天離南坎北圖乾坤坎離配天地日月圖八七九六配木火金水圖乾坤交變十二卦圖坎離交變十二卦圖反對卦升降圖參同器火候圖}
