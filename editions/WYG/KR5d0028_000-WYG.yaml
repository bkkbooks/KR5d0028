body:
  text: 易外别傳道家𩔖提要臣等謹案易外别傳一卷元俞琰撰其書以邵子先天圖闡明丹家之㫖考先天圖傳自陳摶南宋以來無不推為伏羲之秘文卦爻之本義𡊮樞林栗雖據理以攻之然不能抉其假借之根口衆我寡無以相勝也迨元延祐間天台陳應潤始指為叅同契爐火之説其言有根據然宗河洛者深諱之巧辨萬端轇轕彌甚惟琰作此書絶無文飾其後序有曰名之曰易外别傳葢謂丹家之説雖出于易不過依仿而託之者非易之本義也可謂是非皎然不肯自誣其心者矣後序稱是書附周易集説後其子仲温跋亦云易外别傳一卷先君子之所著而附於周易集説後者今通志堂所刋集説成徳序中雖稱易圖纂要一卷易外别傳一卷附焉而印本實無此卷豈初鋟于木後覺其不𩔖而刪之耶白雲霽道藏目錄以此書與易圖通變易筮通變同載於太元部若字號中並題曰雷思齊撰考揭徯斯為思齊作序稱所著有老子本義莊子㫖義和陶詩呉全節序又稱其别有文集而均不及此書殆雲霽以三書同函而誤歟乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀易外别傳序易外别傳一卷元俞琰撰前後自有序蘇州府志琰字玉吾呉縣林屋山人生宋寳祐間以詞賦稱宋亡𨼆居著書不復仕進精於易學尤好鼓琴既老自號石澗卒於元貞間年七十所述諸家易說百餘卷名曰大易㑹要自注上下經並十翼四十卷名曰周易集説今惟集說獨存成氏通志堂刻之經解中而以易圖纂要一卷易外别傳一卷附焉其子仲温跋云易外别傳一卷先君子之所著而附於周易集説之後先君子嘗遇𨼆者以先天圖指示邵氏環中之極𤣥故是書所著發明邵氏之學為多仲温跋今本已無存見經義考云乾隆丙戌六月既望松里小𨼆吳城識于瓶花齋時年六十有五易外别傳者先天圖環中之祕漢儒魏伯陽參同契之學也人生天地間首乾腹坤呼日吸月與天地同一陰陽易以道陰陽故伯陽借易以眀其說大要不出先天一圖是雖易道之緒餘然亦君子養生之切務葢不可不知也圖之妙在乎終坤始復循環無窮其至妙則又在乎坤復之交一動一静之間愚嘗學此矣遍閱雲笈畧曉其一二忽遇𨼆者授以讀易之法乃盡得環中之祕反而求之吾身則康節邵子所謂太極所謂天根月窟所謂三十六宫靡不備焉是謂身中之易今為圖如左附以先儒之說明白無𨼆一覽即見識者當自知之至元甲申八月望日古吳石澗道人俞琰書易外别傳引是書元儒俞石澗氏所撰紀我明黄後峯先生刻之棘寺者也比余長至齋居爰檢而閲焉書中𩔖多莊語如云坤復之交静極機發云藏心於淵氣與神合云妙合而凝周流不息云持滿御神真氣相續凡此皆發先天環中之祕而𤣥門所喻藥物火候悉寓焉雖近就人身提掇然造化之樞紐自可近取而博喻矣嘗怪養生家貪生濟欲毎迷于旁蹊曲徑而不悟是書一掃詖邪歸之正訣名為易外别傳實易之羽翼也黄先生刻而存之厥有指哉余曩遊萬里頗下静功累年已遇至人口訂始悟陽生妙機真宰由已發育有時顧自恨意氣難克非忘則助猶未能廓然順應以臻厥妙耳適得此書印證之殊快所願因叙而校刷數本將貽同好珍攝云世之流𫝊覽觀者慎無泥其卦圖與所謂子午之中而一惟澄神養氣以自得詎亦非吾道之一真種子乎哉隆慶辛未至日抱一居士董𫝊策題欽定四庫全書易外别𫝊元俞琰撰心為太極圖先天天根月窟圖先天六十四卦直圖地承天氣圖月受日光圖先天乾上坤下後天離南坎北圖乾坤坎離配天地日月圖八七九六配木火金水圖乾坤交變十二卦圖坎離交變十二卦圖反對卦升降圖參同器火候圖先天圖參同契云終坤始復如循連環邵康節詩云自從㑹得環中意閒氣胸中一㸃無又云乾遇巽時觀月窟地逢雷處見天根天根月窟閒來往三十六宫都是春愚謂月窟在上天根在下往來乎月窟天根之間者心也何謂三十六宫乾一兊二離三震四巽五坎六艮七坤八是也三十六宫都是春謂和氣周流乎一身也如此則三十六宫不在紙上而在吾身中矣是道也邵康節知之朱紫陽知之俗儒不知也邵康節皇極經世書云先天圖者環中也愚謂人之一身即先天圖也心居人身之中猶太極在先天圖之中朱紫陽謂中閒空處是也圖自復而始至坤而終終始相連如環故謂之環環中者六十四卦環扵其外而太極居其中也在易為太極在人為心人知心為太極則可以語道矣又云冬至之後為呼夏至之後為吸此天地一嵗之呼吸也朱紫陽曰天地間只是一氣自今年冬至到明年冬至只是一個呼吸呼是陽吸是陰愚謂冬至後自復而乾屬陽故以為呼夏至後自姤而坤屬陰故以為吸呼乃氣之出故屬冬至之後吸乃氣之入故屬夏至之後大則為天地一嵗之呼吸小則為人身一息之呼吸參同契云龍呼於虎虎吸龍精又云呼吸相含育佇息為夫婦盖以呼吸為龍虎為夫婦千經萬論譬喻紛紛不過呼吸兩字而已矣又云一動一静天地之至妙者歟一動一静之間天地人之至妙者歟朱紫陽曰圖之左屬陽右屬陰愚謂圖左自復至乾陽之動也圖右自姤至坤陰之静也一動一静之間乃坤末復初陰陽之交在一嵗為冬至在一月為晦朔之間在一日則亥末子初是也孟康曰子之西亥之東其中間也愚謂吾身之乾坤内交静極機發而與天地之極相應是誠天地人之至妙者也又云寂然不動以其無陽坤之象也感而遂通天下之故陽動于中復之義也愚謂寂者静之極也是謂純陰之坤感者動之初也是謂陽生之復寂感之間即一動一静之間也又云無極之前陰含陽也有象之後陽分陰也朱紫陽曰邵子就圖上說循環之意自姤至坤是陰含陽自復至乾是陽分陰坤復之間乃無極𡊮機仲曰朱子謂坤復之間乃無極其論察矣又詩云忽然夜半一聲雷萬户千門次第開若識無中含有象許君親見伏羲來無中含有象即是坤復之間無極而太極也邵子之學非朱子孰能明之又冬至吟云冬至子之半天心無改移一陽初動處萬物未生時𤣥酒味方淡太音聲正希此言如不信更請問庖犧又云何者謂之幾天根理極微今年初盡處明日起頭時此際易得意其間難下辭人能知此意何事不能知又和魏敎授詩云讀書毎到天根處長懼諸公問極𤣥朱紫陽曰子之半是未成子方離於亥之時又曰一陽初動處在貞元之間愚謂此處正是造化之真機程伊川曰若非竊造化之機安能長生至哉言乎又恍惚吟云恍惚陰陽初變化氤氲天地乍旋中間些子好光景安得工夫入語言愚謂康節此詩泄盡天根之極𤣥苟非親造恍惚之境實詣氤氲之域安知其為極𤣥哉邵康節皇極經世書云天地之本其起于中乎是以乾坤屢變而不離乎中也又云自下而上謂之升自上而下謂之降升者生也降者消也故陽生於下陰生於上是以萬物皆反生也又云陰生陽陽生陰陰復生陽陽復生隂是以循環而無窮也又乾坤吟云道不逺於人乾坤只在身誰能天地外别去覔乾坤愚謂乾坤陰陽之純坎離陰陽之交乾純陽為天故居中之上坤純陰為地故居中之下坎陰中含陽為月離陽中含陰為日故居乾坤之中其餘六十卦自坤中一陽之生而至五陽則升之極矣遂為六陽之純乾自乾中一陰之生而至五陰則降之極矣遂為六陰之純坤一升一降上下往來盖循環而無窮也天地如此人身亦如此子時氣到尾閭丑寅在腰間夘辰巳在脊膂午在泥丸未申酉在胸膈戌亥則又歸扵腹中此一日之升降然也一息亦然吸則自下而升扵上呼則自上而降於下在天則應星而如斗指子午在地則應潮而如月在子午盖天地之中也參同契云合符行中又云運移不失中又云浮㳺守規中人能知吾身之中以合乎天地之中則乾坤不在天地而在吾身矣吾安得夫圓機之士而與之言身中之乾坤而極論身中之中哉吁易曰至哉坤元萬物資生乃順承天參同契云恒順地理承天布宣愚謂人之元氣藏於腹猶萬物藏於坤神入地中猶天氣降而至于地氣與神合猶地道之承天天地以此而生物吾身以此而産藥太𤣥經云藏心于淵美厥靈根與此同㫖邵康節曰月體本黒受日之光而白愚謂日為太陽月為太陰月本無光月之光乃日之光也陽明陰暗陽施陰受故太陰受太陽之光以為明人之心為太陽氣海猶太陰心定則神凝神凝則氣聚人能凝神入於氣中則氣與神合與太陰受太陽之光無異邵康節曰神通於心氣統於腎形統於首形氣交而神主乎其中三才之道也愚謂人之一身首乾腹坤而心居其中其位猶三才也氣統於腎形統於首一上一下本不相交所以使之交者神也神運乎中則上下渾融與天地同流此非三才之道歟夫神守於腎則静而藏伏坤之道也守於首則動而運行乾之道也藏伏則妙合而凝運行則周流不息妙合而凝者藥也周流不息者火也陰符經云機在目邵康節曰天之神發乎日人之神發乎目愚謂目之所至心亦至焉故内煉之法以目視鼻以鼻對臍降心火入於氣海盖不過片晌工夫而已易曰乾為天坤為地離為日坎為月又曰乾為首坤為腹太𤣥經云陽氣潜萌於黄宫黄庭經云子欲不死修崑崙又云出日入月呼吸存愚謂首居上而圓諸陽之所㑹乾天之象也故易以乾為首崑崙在西北乾位故黄庭經以乾為崑崙腹居下而中虚八脈之所歸坤地之象也故易以坤為腹天𤣥而地黄故太𤣥以坤為黄宫日生于東月生于西故易以離為日坎為月呼吸出入升降上下往來無窮故黄庭以呼吸為日月或以兩目為日月非也兩目僅有日月之形無日月之用參同契云九還七返八歸六居又云七八數十五九六亦相應又云金水合處木火為侣四者渾沌列為龍虎愚謂六七八九乃水火木金之成數木數八屬東火數七屬南木自東而升則與火為侣于南矣金數九屬西水數六屬北金自西而降則與水合處于北矣丹家有所謂赤龍黒虎者東方蒼龍七宿運而之南則為赤龍西方白虎七宿運而之北則為黒虎無非譬喻身中之呼吸究而言之何龍虎之有何金水木火之有何七八九六之有皆譬喻耳或疑九七八言還返歸六獨言居得無異乎曰六居北不動三方之還返歸皆聚於北故言居也乾上坤下吾身之天地也泰左否右吾身天地之升降也復非十一月亦非夜半子時乃身中之子也姤非五月亦非日中午時乃身中之午也張悟真云否泰交則陰陽或升或降盖謂身中之否泰坎北離南吾身之水火也既濟東未濟西吾身水火之升降也屯居寅蒙居戍吾身之火候也寅非平旦寅乃身中之寅戌非黄昏戍乃身中之戍張悟真曰屯蒙作動静在朝在昏盖謂身中之屯䝉參同契云朔旦屯直事至暮蒙當受晝夜各一卦用之依次序既未至昧爽終則復更始日辰為期度動静有早晚春夏㩀内體從子到辰巳秋冬當外用自午訖戌亥愚謂參同契以乾坤為鼎坎離為藥因以其餘六十卦為火候一日有十二時兩卦計十二爻故曰用兩卦朝屯則暮蒙朝需則暮訟以至既濟未濟一也屯倒轉則為蒙有一升一降之象屯自内而升為朝為晝為春夏蒙自外而降為暮為夜為秋冬諸卦皆然夫以六十卦分布為三十日以象一月然遇小盡則當如之何盖比喻耳非真謂三十日也或以此為閉目數息之法則不勝其煩且勞矣豈至簡至易之道哉周易參同契金丹鼎器藥物火候萬殊一本之圖惟斯之妙術兮審諦不誑語𫝊於億世後兮昭然而可考煥若星經漢兮昺如水宗海思之務令熟兮反覆眠上下千周粲彬彬兮萬遍將可覩神明或吿人兮心靈忽自悟探端索其緒兮必得其門戸天道無適莫兮常傳與賢者右係校正彭真一明鏡圖畧加増損而成九環易曰天行健君子以自强不息胡安定曰天之形望之其色蒼然南樞入地下三十六度北樞出地上三十六度狀如倚杵此天之形也言其用則一晝夜之間凡行九十餘萬里夫人之一呼一吸謂之一息一息之間天已行八十餘里人之一晝一夜而天行九十餘萬里則天之健用可知矣又曰人之神氣萃之則生散之則亡天有剛陽之氣運行不息故天體常存也愚按參同契云闗鍵有低昻兮周天遂奔走闗鍵謂南北二極周天謂二十八宿奔走謂運行也天行如彈丸周匝運轉晝夜不停其南北兩端一髙一下乃闗鍵也人身亦然上有天闗下有地軸若能逥天闗轉地軸則上下往來一息一周天也愚又按參同契云循據璇璣升降上下璇璣斗也天以斗為機人以心為機心運於身中猶斗運扵天中愚又按陰符經云觀天之道執天之行盡矣盖人道與天道一也人能收視返聽藏心於淵馭呼吸之往來周流不息則與天道同運而天行之機吾得而執之矣雖然天之道可以觀天之行未易執也孰能執之唯虚心者能執之易曰君子黄中通理正位居體美在其中而暢于四支發于事業美之至也徐進齋曰丹家亦取此義魏伯陽參同契謂黄中漸通理潤澤達肌膚但作用不同此為義理存養皆天公諸天也彼為血氣保固由人私諸已也愚按參同契之說不過借易道以推明己意其間引用易中之辭未必皆取本分之義盖易與天地相似人身亦與天地相似是故魏伯陽假易以作參同契黄中指身中之黄道易曰不逺復无祗悔元吉朱紫陽曰老子言治人事天莫若嗇夫唯嗇是謂早服早服謂之重積徳被他說得曲盡早服者言能圖則不逺而復便在此也重積徳者言先已有所積復養以嗇是又加積之也如修養者此身未有所損失而又加以嗇養是謂早服而重積若待其已損而後養則養之方足以補其所損不得謂之重積矣所以貴早服早服者早覺未損而嗇之也如某此身已衰耗如破屋相似東扶西倒雖欲修養亦何能有益今年得蔡季通書説近來深曉養生之理盡得其法只是城郭不完無所施其功也看來是如此愚按曽至游集仙𫝊云周從泗州人也徐神翁深重之曰我少而婚是人幼得道其神全吾不及也如周從者其亦老子所謂早服而重積者歟愚又按素問云丈夫八嵗腎氣實髪長齒更二八腎氣盛天癸至精氣溢瀉陰陽和故能有子三八腎氣平均筋骨致强故真牙生而長極四八筋骨隆盛肌骨壯滿五八腎氣衰髪墮齒槁六八陽氣衰竭於上面焦髪須白七八肝氣衰筋不能動天癸竭精少腎藏衰形體皆極八八則齒髪去又云上古之人其知道者法于陰陽和于術數食飲有節起居有常不妄作勞故能形與神俱而盡終其天年度百嵗乃去今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心溺扵生樂起居無節故半百而衰也愚謂人至于老則多忘神昏故也動則疲倦氣衰故也内煉之道以神氣為本神昏氣衰則以何者為本易曰水洊至習坎愚按靈樞經云日行二十八宿人經脈上下左右前後二十八脈周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脈冄動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺日行二分二百七十息氣行十六丈二尺氣行交通於中一周于身下水二刻日行二十五分五百四十息氣行再周于身下水四刻日行四十分二千七百息氣行十周于身下水二十刻日行五宿二十分一萬三千五百息氣行五十營于身水下百刻日行二十八宿漏水皆盡脈終矣凡行八百一十丈也又云氣之行如水之流如日月之行不休故陰脈營其藏陽脈營其府如環之無端莫知其紀終而復始愚謂人身氣血常常流通則安一有壅滯則病内煉之道息息相繼如水之洊至而其流相續則真氣上下灌注亦如水之流通也易曰坎為水為月離為火為日項平庵曰心以坎為體離為用故心欲虛而澄腎以離為體坎為用故丹田欲實而温損益皆三陽三陽之離損之火上飛益之火下伏又曰離體之火上騰故損離體之火下駐故益愚謂内煉之道至簡至易唯欲降心火入于丹田耳丹田在臍之後腎之前正居腹中丹家諱言心腎謂心腎非坎離盖指呼吸為坎離殊不思呼吸乃坎離之用心腎乃坎離之體人之一身心為之主故獨居中腎為之基故獨居下丹家不言心腎而言身心身即腹也腎在其中矣豈可舎腎哉腎屬水心屬火火入水中則水火交媾如晦朔之間日月之合璧易曰山澤通氣又曰二氣感應以相與愚按參同契云自然之所為兮非有邪偽道若山澤氣相烝兮興雲而為雨盖人身之陰陽絪緼交結于丹田則升于泥丸滃然如雲化為甘澤陳希夷詩云倐爾火輪煎地脈愕然神瀵湧山椒與此同㫖神瀵出列子嘗謂山澤之氣相通由其虛也唯虛也故二氣感應以相與不虛則窒而不通安能相與内煉之道貴乎心虛心虛則神凝神凝則氣聚氣聚則興雲為雨與山澤相似離騷逺遊篇云道可受兮不可𫝊其小無内兮其大無垠毋滑而魂兮彼將自然壹氣孔神兮於中夜存虚以待之兮無為之先朱紫陽注云盖廣成子之吿黄帝不過如此實神仙之要訣也易曰一闔一闢謂之變往來不窮謂之通程伊川曰涵養之道出入之息者闔闢之機而已又曰闔闢往來見之鼻息張横渠曰人之有息盖剛柔相摩乾坤闔闢之象也朱紫陽調息箴云氤氲開闔其妙無窮誰其尸之不宰之功愚按參同契云二用無爻位周流行六虛往來既不定上下亦無常幽潛淪匿變化于中二用九六也六虛卦之六畫也以喻一呼一吸往來上下久之則神凝息定所以成變化也呼則氣出陽之闢也吸則氣入陰之闔也盖人身之陰陽與天地之陰陽相似若能御呼吸於上下使之周流不息則闔闢往來之妙盡在吾身中矣或曰大有大闔闢小有小闔闢一息之闔闢即一刻之闔闢一刻之闔闢即一時之闔闢一時之闔闢即一日之闔闢一日之闔闢即一月之闔闢一月之闔闢即一年之闔闢以至一世之闔闢一元之闔闢萬古之闔闢其理一也易曰日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉程伊川曰易中只是言反復往來上下愚謂丹家之書廣譬曲喻亦只是言反復往來上下外此皆邪説妄行非真要自然之道也愚按文子云流水之不腐以其逝故也戸樞之不蠧以其運故也文子計然也周時人老子之弟子也人身氣血亦欲其往來流通一不流通小則為癤大則為癰疽癤者節也癰者壅也疽者阻也愚又按子華子云古之知道者築壘以防邪疏源以毓真深居静處不為物攖動息出入而與神氣俱魂魄守戒謹窒其兌専一不分真氣乃存上下灌注氣乃流通如水之流如日月之行而不休陰營其藏陽固其府源流泏泏滿而不溢冲而不盈夫是之謂久生子華子程本也孔子與之傾盖而語者也人身氣血往來循環于上下晝夜不停猶江河之水相似人但見江河之水東流至于海而不竭殊不知名山大川孔穴皆相通也豈不見廬山瀑布乎晝夜傾注不絶何也水由地中行盖往來相循環也日月之行亦然隨天之旋一出一入往來不窮人知吾身自有日月則往來不窮之妙只在吾身而不必索之髙逺矣醫書云人身有任督二脈任脈者起于中極之下以上毛際循腹裏上闗元至咽喉屬陰脈之海督脈者起扵下極之腧並于脊裏上至風府入腦上顛循額至鼻柱屬陽脈之海所以謂之任脈者女子得之以姙養也謂之督脈者以其督領經脈之海也鹿運尾閭盖能通其督脈者也龜納鼻息盖能通其任脈者也人能通此二脈則百脈皆通黄庭經云皆在心内運天經晝夜存之自長生天經乃吾身之黄道呼吸往來於此即任督二脈是也右易外别𫝊一卷為之圖為之説披闡先天圖環中之極𤣥證以參同契隂符諸書參以伊川横渠諸儒之至論所以發朱子之所未發以推廣邵子言外之意愚雖弗暇専志從事於斯而丹之妙用非苟知之盖嘗試之者也故敢直指方士之所靳以破學者之惑嘗慨夫世所𫝊丹家之書廋辭𨼆語使覽者無罅縫可入往往目眩心碎而掩卷長嘆如蔡季通𡊮機仲嘗與朱子共訂正參同契矣雖能考其字義然不得其的𫝊未免臆度而已愚今既得所𫝊又何忍緘嘿以自私迺述是書附于周易集説之後而名之曰易外别傳盖謂丹家之説雖出于易不過依倣而託之者初非易之本義也其詳載于參同契發揮三篇兹不贅云石澗俞琰書元儒胡雙湖氏嘗為周易翼𫝊三篇又集太𤣥參同洞極之𩔖以為外篇而石澗俞氏亦為大易㑹要周易集説又舉先天圖環中之祕魏伯陽參同契之學以為易外别𫝊其取諸易者皆可謂博矣翼𫝊之書坊梓行㑹要集説舊嘗刻姑蘇今亦不見而此易外别傳則友人徐醫院鏊所恵盖亦姑蘇所刻本也其發明邵子之説為多于易盖有助焉朱子所謂易中無所不有茍其言自成一家可推而通則亦無害於易者是也而世顧或求之丹砂爐火之間誤矣石澗所著别有參同契發揮以其無繫扵易也故不復叙論正徳辛巳莆陽黄鞏書于蒙山草堂易外别傳
